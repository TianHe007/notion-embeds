<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KV cache 实时计算器</title>
<style>
  :root{
    --txt:#1f1e1c; --txt2:#6b6a64; --txt3:#9a988f;
    --surface:#ffffff; --surface2:#f4f2ec; --border:rgba(0,0,0,.12); --border2:rgba(0,0,0,.22);
    --kv-bg:#E6F1FB; --kv-txt:#0C447C; --q-bg:#f1efe8; --q-txt:#9a988f;
    --accent:#0C447C; --radius:8px; --radius-lg:12px;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --txt:#e8e6dd; --txt2:#b4b2a9; --txt3:#888780;
      --surface:#26251f; --surface2:#2c2c2a; --border:rgba(255,255,255,.14); --border2:rgba(255,255,255,.26);
      --kv-bg:#0C447C; --kv-txt:#B5D4F4; --q-bg:#2c2c2a; --q-txt:#888780; --accent:#85B7EB;
    }
  }
  *{box-sizing:border-box}
  body{margin:0; padding:12px 14px; background:transparent; color:var(--txt); font-family:var(--sans); line-height:1.45;}
  .wrap{max-width:680px; margin:0 auto;}
  .btn{padding:8px 16px; border:.5px solid var(--border2); border-radius:var(--radius); background:transparent; font-size:14px; cursor:pointer; color:var(--txt); font-family:inherit;}
  .btn:hover{background:var(--surface2);}
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .chip{display:inline-flex; align-items:center; justify-content:center; min-width:24px; height:22px; padding:0 6px; border-radius:var(--radius); font-size:12px; font-family:var(--mono);}
  .chip-kv{background:var(--kv-bg); color:var(--kv-txt);}
  .chip-q{background:var(--q-bg); color:var(--q-txt); text-decoration:line-through;}
  .slot{display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 7px; border:.5px solid var(--border); border-radius:var(--radius); background:var(--surface); min-width:48px;}
  .slot-new{animation:pop .35s ease;}
  @media (prefers-reduced-motion:no-preference){@keyframes pop{from{opacity:0; transform:translateY(-8px) scale(.9)} to{opacity:1; transform:none}}}
  .row{display:flex; align-items:center; gap:10px; margin:0 0 .6rem; flex-wrap:wrap;}
  .panel{min-height:auto; padding:9px 12px; border:.5px solid var(--border); border-radius:var(--radius-lg); margin:0 0 .7rem;}
  .cache{display:flex; flex-wrap:wrap; gap:7px; min-height:42px; padding:9px; border:.5px dashed var(--border2); border-radius:var(--radius-lg); margin:0 0 .9rem;}
  .hint{font-size:13px; color:var(--txt2); margin:0 0 6px;}

  .calc{border:.5px solid var(--border); border-radius:var(--radius-lg); padding:12px 14px;}
  .calc h3{font-size:15px; font-weight:500; margin:0 0 2px;}
  .dims{display:grid; grid-template-columns:repeat(auto-fit,minmax(104px,1fr)); gap:8px; margin:9px 0 10px;}
  .dim{display:flex; flex-direction:column; gap:3px;}
  .dim label{font-size:12px; color:var(--txt2);}
  .dim input, .dim select{font-family:var(--mono); font-size:14px; padding:5px 8px; border:.5px solid var(--border2); border-radius:var(--radius); background:var(--surface); color:var(--txt); width:100%;}
  .Lbox{background:var(--surface2); border-radius:var(--radius); padding:6px 10px; font-size:13px; color:var(--txt2); margin-bottom:9px;}
  .Lbox b{color:var(--accent); font-family:var(--mono); font-size:15px;}
  .fsym{font-family:var(--mono); font-size:13px; color:var(--txt2); margin-bottom:3px;}
  .fsub{font-family:var(--mono); font-size:14px; line-height:1.7; word-break:break-word;}
  .fsub .val, .fshape .val{color:var(--accent); font-weight:500;}
  .fsub .L, .fshape .L{background:var(--kv-bg); color:var(--kv-txt); padding:1px 5px; border-radius:5px;}
  .fshape{font-family:var(--mono); font-size:13.5px; margin-bottom:7px; word-break:break-word;}
  .fshape .lab{color:var(--txt2); font-family:var(--sans); font-size:13px;}
  .result{font-size:26px; font-weight:500; margin-top:8px;}
  .result small{font-size:14px; color:var(--txt2); font-weight:400;}
  .proj{font-size:13px; color:var(--txt2); margin-top:6px;}
  .proj b{color:var(--accent); font-family:var(--mono);}
</style>
</head>
<body>
<div class="wrap">

  <div class="row">
    <button class="btn" id="gen">生成下一个 token</button>
    <button class="btn" id="rst" style="font-size:13px;">重置</button>
    <span id="stepinfo" style="font-size:13px; color:var(--txt2);"></span>
  </div>

  <div class="panel" id="curstep"></div>

  <p class="hint">KV cache（持续保存，逐步变长）：</p>
  <div class="cache" id="cache"></div>

  <div class="calc">
    <h3>KV cache 实时计算</h3>
    <p style="font-size:12.5px; color:var(--txt2); margin:0;">维度可改；每生成一个 token，L 自动 +1，公式与结果实时变化。</p>

    <div class="dims">
      <div class="dim"><label>B（batch）</label><input type="number" id="d_B" value="1" min="1" step="1"></div>
      <div class="dim"><label>n_kv（KV 头数）</label><input type="number" id="d_nkv" value="8" min="1" step="1"></div>
      <div class="dim"><label>d_k（每头维度）</label><input type="number" id="d_dk" value="128" min="1" step="1"></div>
      <div class="dim"><label>n_layers（层数）</label><input type="number" id="d_L" value="32" min="1" step="1"></div>
      <div class="dim"><label>bytes（精度）</label>
        <select id="d_bytes">
          <option value="2" selected>fp16 = 2</option>
          <option value="4">fp32 = 4</option>
          <option value="1">int8 = 1</option>
        </select>
      </div>
      <div class="dim"><label>模型预设</label>
        <select id="d_preset">
          <option value="custom" selected>自定义</option>
          <option value="l2-7b">Llama-2-7B (MHA)</option>
          <option value="l2-70b-mha">Llama-2-70B · MHA</option>
          <option value="l2-70b-gqa">Llama-2-70B · GQA</option>
          <option value="l3-8b">Llama-3-8B (GQA)</option>
          <option value="mistral">Mistral-7B (GQA)</option>
        </select>
      </div>
    </div>

    <div class="Lbox">L（序列长度）= 当前已生成 token 数 = <b id="Lval">0</b></div>

    <div class="fshape" id="fshape"></div>
    <div class="fsym">KV cache = 2 × B × L × n_kv × d_k × n_layers × bytes</div>
    <div class="fsub" id="fsub"></div>
    <div class="result" id="result">0 <small>B</small></div>
    <div class="proj" id="proj"></div>
  </div>

</div>

<script>
(function(){
  const tokens = ["The","cat","sat","on","the","mat","by","the","warm","fire","at","night"];
  const presets = {
    "l2-7b":      {nkv:32, dk:128, layers:32},
    "l2-70b-mha": {nkv:64, dk:128, layers:80},
    "l2-70b-gqa": {nkv:8,  dk:128, layers:80},
    "l3-8b":      {nkv:8,  dk:128, layers:32},
    "mistral":    {nkv:8,  dk:128, layers:32}
  };
  let n = 0;
  const $ = id => document.getElementById(id);

  function human(b){
    if(b>=1073741824) return [(b/1073741824).toFixed(2), "GiB"];
    if(b>=1048576) return [(b/1048576).toFixed(2), "MiB"];
    if(b>=1024) return [(b/1024).toFixed(2), "KiB"];
    return [String(Math.round(b)), "B"];
  }

  function num(id, fallback){ const v = parseInt($(id).value,10); return (isNaN(v)||v<1) ? fallback : v; }

  function renderCalc(){
    const B = num("d_B",1), nkv = num("d_nkv",8), dk = num("d_dk",128), layers = num("d_L",32);
    const bytes = parseInt($("d_bytes").value,10);
    const L = n;
    const total = 2 * B * L * nkv * dk * layers * bytes;

    $("Lval").textContent = L;
    $("fshape").innerHTML =
      '<span class="lab">K / V cache shape（每层）= </span>[B, n_kv, L, d_k] = '+
      '[<span class="val">'+B+'</span>, <span class="val">'+nkv+'</span>, <span class="L">'+L+'</span>, <span class="val">'+dk+'</span>]';
    $("fsub").innerHTML =
      '= 2 × <span class="val">'+B+'</span> × <span class="L">'+L+'</span> × <span class="val">'+nkv+'</span> × '+
      '<span class="val">'+dk+'</span> × <span class="val">'+layers+'</span> × <span class="val">'+bytes+'</span>';
    const [v,u] = human(total);
    $("result").innerHTML = v+' <small>'+u+'</small>';

    const projTotal = 2 * B * 4096 * nkv * dk * layers * bytes;
    const [pv,pu] = human(projTotal);
    $("proj").innerHTML = '若 L = 4096（长上下文）：<b>'+pv+' '+pu+'</b>　（当前维度下，不用一直点也能看到量级）';
  }

  function renderMechanism(justAdded){
    const cache = $("cache");
    cache.innerHTML = "";
    for(let i=0;i<n;i++){
      const s = document.createElement("div");
      s.className = "slot" + (justAdded && i===n-1 ? " slot-new" : "");
      s.innerHTML = '<span style="font-size:13px; color:var(--txt2)">'+tokens[i]+'</span>'+
        '<span style="display:flex; gap:4px;"><span class="chip chip-kv">K</span><span class="chip chip-kv">V</span></span>';
      cache.appendChild(s);
    }
    if(n===0){
      $("curstep").innerHTML = '<span style="font-size:14px; color:var(--txt3)">点击「生成下一个 token」开始 —— 看缓存怎么长大，公式怎么算。</span>';
    } else {
      $("curstep").innerHTML =
        '<div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">'+
        '<span style="font-size:14px;">当前 token <b style="font-family:var(--mono)">'+tokens[n-1]+'</b> 算出三个向量：</span>'+
        '<span style="display:flex; align-items:center; gap:6px;"><span class="chip chip-q">Q</span><span style="font-size:13px; color:var(--txt3)">用完即丢弃</span></span>'+
        '<span style="display:flex; align-items:center; gap:6px;"><span class="chip chip-kv">K</span><span class="chip chip-kv">V</span><span style="font-size:13px; color:var(--kv-txt)">→ 存入缓存</span></span>'+
        '</div>';
    }
    $("gen").disabled = n>=tokens.length;
    $("stepinfo").textContent = n>=tokens.length ? "序列已生成完" : "";
  }

  function renderAll(justAdded){ renderMechanism(justAdded); renderCalc(); }

  $("gen").addEventListener("click", ()=>{ if(n<tokens.length){ n++; renderAll(true);} });
  $("rst").addEventListener("click", ()=>{ n=0; renderAll(false); });
  $("d_preset").addEventListener("change", ()=>{
    const p = presets[$("d_preset").value];
    if(p){ $("d_nkv").value=p.nkv; $("d_dk").value=p.dk; $("d_L").value=p.layers; }
    renderCalc();
  });
  ["d_nkv","d_dk","d_L"].forEach(id=>{
    $(id).addEventListener("input", ()=>{ $("d_preset").value="custom"; renderCalc(); });
  });
  ["d_B","d_bytes"].forEach(id=>{
    $(id).addEventListener("input", renderCalc);
    $(id).addEventListener("change", renderCalc);
  });

  renderAll(false);
})();
</script>
</body>
</html>
